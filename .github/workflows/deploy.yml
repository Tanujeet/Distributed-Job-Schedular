name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: distcronregistry.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push api-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api-service/Dockerfile
          push: true
          tags: distcronregistry.azurecr.io/api-service:latest

      - name: Build and Push scheduler-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/scheduler-service/Dockerfile
          push: true
          tags: distcronregistry.azurecr.io/scheduler-service:latest

      - name: Build and Push worker-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker-service/Dockerfile
          push: true
          tags: distcronregistry.azurecr.io/worker-service:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy api-service
        run: |
          EXISTS=$(az containerapp show --name api-service --resource-group distributed-cron-rg --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name api-service \
              --resource-group distributed-cron-rg \
              --environment distributed-cron-env \
              --image distcronregistry.azurecr.io/api-service:latest \
              --registry-server distcronregistry.azurecr.io \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
              --target-port 4000 \
              --ingress external \
              --min-replicas 1 \
              --env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}" PORT=4000
          else
            az containerapp update \
              --name api-service \
              --resource-group distributed-cron-rg \
              --image distcronregistry.azurecr.io/api-service:latest \
              --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}" PORT=4000
          fi

      - name: Deploy scheduler-service
        run: |
          EXISTS=$(az containerapp show --name scheduler-service --resource-group distributed-cron-rg --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name scheduler-service \
              --resource-group distributed-cron-rg \
              --environment distributed-cron-env \
              --image distcronregistry.azurecr.io/scheduler-service:latest \
              --registry-server distcronregistry.azurecr.io \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
              --ingress none \
              --min-replicas 1 \
              --env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}"
          else
            az containerapp update \
              --name scheduler-service \
              --resource-group distributed-cron-rg \
              --image distcronregistry.azurecr.io/scheduler-service:latest \
              --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}"
          fi

      - name: Deploy worker-service
        run: |
          EXISTS=$(az containerapp show --name worker-service --resource-group distributed-cron-rg --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            az containerapp create \
              --name worker-service \
              --resource-group distributed-cron-rg \
              --environment distributed-cron-env \
              --image distcronregistry.azurecr.io/worker-service:latest \
              --registry-server distcronregistry.azurecr.io \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password "${{ secrets.REGISTRY_PASSWORD }}" \
              --ingress none \
              --min-replicas 1 \
              --env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}"
          else
            az containerapp update \
              --name worker-service \
              --resource-group distributed-cron-rg \
              --image distcronregistry.azurecr.io/worker-service:latest \
              --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" REDIS_URL="${{ secrets.REDIS_URL }}"
          fi